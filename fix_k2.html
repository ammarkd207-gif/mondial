<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#111;color:white;font-family:Arial;text-align:center;padding:40px">
<h2>تصحيح نتيجة كولومبيا 3-1 أوزبكستان</h2>
<p id="status" style="color:yellow">اضغط الزر لتصحيح النتيجة</p>
<button onclick="fix()" style="background:#22c55e;color:white;padding:20px 40px;font-size:18px;border:none;border-radius:12px;cursor:pointer">✅ صحّح النتيجة</button>
<script>
const SB = supabase.createClient(
    'https://okyvfepzlwoqbrmwjvlo.supabase.co',
    'sb_publishable_6yOSG0nSOAx-TK18PoCFpQ_UjG11xCZ'
);
async function fix() {
    document.getElementById('status').textContent = '⏳ جاري التصحيح...';
    const {error} = await SB.from('match_results')
        .update({ home_score: 3, away_score: 1 })
        .eq('match_id', 'k2');
    if (error) {
        document.getElementById('status').textContent = '❌ خطأ: ' + error.message;
    } else {
        document.getElementById('status').style.color = '#22c55e';
        document.getElementById('status').textContent = '✅ تم التصحيح! كولومبيا 3-1 أوزبكستان';
    }
}
</script>
</body>
</html>
